spring.application.name=E10

# Configuración de la base de datos
# Cambia 'localhost' si tu DB está en la nube y '3306' si usas otro puerto
spring.datasource.url=jdbc:mysql://localhost:3306/defaultdb?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=

# Driver (opcional en versiones nuevas, pero bueno tenerlo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Solo usa la siguiente línea si tienes problemas de compatibilidad
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect